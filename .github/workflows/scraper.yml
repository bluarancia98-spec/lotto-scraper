name: Lotto Auto Scraper

on:
  schedule:
    # 한국 시간 기준 토요일 20시 50분 (UTC 11:50) - 추첨 직후
    - cron: '50 11 * * 6'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 파이썬 크롤러 실행 (데이터 생성)
      run: python scraper.py

    - name: 생성된 data 폴더 강제 푸시 (핵심 해결책)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 깃허브가 무시하더라도 강제로 data 폴더를 추적 목록에 쑤셔 넣습니다.
        git add --force data/
        
        # 2. 에러가 나더라도 Actions가 멈추지 않고 넘어가도록 안전장치(|| true)를 추가합니다.
        git commit -m "Auto Update: 로또 1등 당첨 데이터 강제 동기화" || true
        git push origin main || true
