name: Lotto Auto Scraper

on:
  schedule:
    # 매주 토요일 오후 9시 30분 실행 (KST 기준, UTC 12:30)
    - cron: '30 12 * * 6'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 중요: GitHub Actions가 저장소에 코드를 밀어넣을 수 있도록 쓰기 권한 부여
    permissions:
      contents: write 

    steps:
    - name: 저장소 체크아웃 (Checkout repository)
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정 (Set up Python)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 # 사용하는 패키지에 맞게 수정 필요 시 알려주세요

    - name: 스크래퍼 실행 (Run Scraper)
      run: python scraper.py

    - name: 변경된 데이터 저장 및 푸시 (Commit and Push changes)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # data 폴더를 추적 (폴더명이 다를 경우 수정하세요)
        git add data/
        
        # 변경사항이 있을 때만 커밋하고 푸시
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update lotto data"
        git push
