name: Lotto Auto Scraper

on:
  schedule:
    - cron: '10 12 * * 6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 내 저장소 파일 가져오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 크롤링에 필요한 도구 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. 파이썬 크롤러 로봇 실행하기
      run: python scraper.py

    - name: 5. 수집된 JSON 데이터를 깃허브에 완벽하게 강제 저장하기
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add . 
        if git diff --staged --quiet; then
          echo "새로 업데이트된 데이터가 없습니다."
        else
          git commit -m "Auto Update: 최신 1등 배출점 데이터 갱신 완료"
          git push
        fi
