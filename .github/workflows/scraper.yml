name: Lotto Auto Scraper

on:
  schedule:
    # 매주 토요일 오후 8시 50분 (KST 기준) 자동 실행
    - cron: '50 11 * * 6'
  workflow_dispatch: # 수동 실행 버튼 활성화

# 깃허브 액션이 저장소에 파일을 쓸 수 있도록 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 파이썬 크롤러 실행 (데이터 생성)
      run: python scraper.py

    - name: 생성된 데이터를 깃허브 저장소에 강제 푸시 (핵심 해결책)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # data 폴더 전체를 강제로 깃허브 추적 목록에 추가합니다.
        git add -f data/
        
        # 변경 사항이 있을 때만 커밋하고 푸시하여 에러를 방지합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update: 1226회차 최신 당첨 데이터 갱신" && git push origin main)
