name: Lotto Auto Scraper

on:
  schedule:
    - cron: '50 11 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 핵심 우회 기술: 흔한 리눅스 서버 대신, 방화벽이 잘 잡지 않는 macOS 서버 환경 강제 지정
    runs-on: macos-latest 

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치 (우회용)
      # 브라우저 위장 통신을 위해 cloudscraper 설치
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper requests

    - name: 파이썬 크롤러 실행 (방화벽 우회 통신)
      run: python scraper.py

    - name: 오픈소스 기반 자동 커밋 및 푸시
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto Update: 로또 1226회차 최신 당첨 데이터 갱신 (방화벽 우회 완료)"
        file_pattern: 'data/*.json'
